<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Christ Game Hub</title>
    <style>
        body { background: #0d0d0d; color: #0ff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .container { text-align: center; background: rgba(255, 255, 255, 0.05); padding: 40px; border-radius: 20px; border: 1px solid #0ff; box-shadow: 0 0 20px #0ff; }
        .game-list { margin-top: 30px; display: grid; gap: 20px; }
        .card { padding: 20px; border: 1px solid #0ff; border-radius: 10px; cursor: pointer; transition: 0.3s; text-decoration: none; color: #0ff; display: block; }
        .card:hover { background: #0ff; color: #000; box-shadow: 0 0 30px #0ff; transform: scale(1.05); }
        h1 { text-transform: uppercase; letter-spacing: 5px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎮 CHRIST HUB</h1>
        <div class="game-list">
            <a href="CanYouCount.html" class="card">
                <h3>🔢 HOW FAST CAN YOU COUNT?</h3>
                <p>Uji Akurasi & Kecepatan Berhitung</p>
            </a>
            
            <a href="#" class="card" style="opacity: 0.5;">
                <h3>🔒 NEXT GAME</h3>
                <p>Coming Soon...</p>
            </a>
        </div>
    </div>
</body>
</html>
